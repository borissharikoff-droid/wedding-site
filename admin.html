<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>RSVP — список гостей</title>
<style>
  :root{--accent:#e0592a;--ink:#2a241d;--bg:#faf6f0;--line:#e7ddce;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:24px 16px 60px}
  h1{font-size:1.4rem;margin:0 0 18px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  input[type=password]{flex:1;min-width:180px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px}
  button{padding:10px 16px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:14px}
  button:disabled{opacity:.5;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .msg{margin:8px 0;font-size:14px}
  .msg.err{color:#c0392b}
  .msg.ok{color:#2e7d32}
  .stats{display:flex;gap:14px;margin:14px 0;flex-wrap:wrap}
  .stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-size:14px}
  .stat b{font-size:1.3rem;display:block}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:14px}
  th{background:#f2ebe0;font-weight:700}
  tr:last-child td{border-bottom:none}
  .yes{color:#2e7d32;font-weight:600}
  .no{color:#c0392b;font-weight:600}
  .empty{padding:30px;text-align:center;color:#8a8074}
  @media(max-width:600px){
    table,thead,tbody,tr,th,td{display:block}
    thead{display:none}
    tr{border-bottom:2px solid var(--line);padding:10px 0}
    td{border:none;padding:4px 12px}
    td:before{content:attr(data-label);font-weight:700;display:inline-block;min-width:90px;color:#8a8074}
  }
</style>
</head>
<body>
  <h1>💌 Список анкет RSVP</h1>
  <div class="bar">
    <input type="password" id="keyInput" placeholder="Admin-ключ (ADMIN_KEY из Railway)" autocomplete="off">
    <button id="loadBtn">Показать</button>
    <button id="refreshBtn" class="ghost" hidden>Обновить</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="stats" id="stats" hidden></div>
  <div id="tableWrap"></div>

<script>
(function(){
  var API_BASE = 'https://wedding-rsvp-api-production-d474.up.railway.app';
  var keyInput = document.getElementById('keyInput');
  var loadBtn = document.getElementById('loadBtn');
  var refreshBtn = document.getElementById('refreshBtn');
  var msg = document.getElementById('msg');
  var stats = document.getElementById('stats');
  var tableWrap = document.getElementById('tableWrap');

  // remember the key only in THIS browser's localStorage, purely for
  // convenience on repeat visits — never sent anywhere except our own API
  var saved = localStorage.getItem('rsvp_admin_key');
  if (saved) keyInput.value = saved;

  function setMsg(text, cls){
    msg.textContent = text || '';
    msg.className = 'msg' + (cls ? ' ' + cls : '');
  }

  function fmtDate(iso){
    try {
      var d = new Date(iso);
      return d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch(e){ return iso; }
  }

  function render(list){
    var yes = list.filter(function(r){ return r.attend === 'yes'; }).length;
    var no = list.length - yes;
    stats.hidden = false;
    stats.innerHTML =
      '<div class="stat"><b>' + list.length + '</b>всего анкет</div>' +
      '<div class="stat"><b>' + yes + '</b>придут</div>' +
      '<div class="stat"><b>' + no + '</b>не придут</div>';

    if (!list.length){
      tableWrap.innerHTML = '<div class="empty">Пока анкет нет</div>';
      return;
    }
    var rows = list.map(function(r){
      return '<tr>' +
        '<td data-label="Имя">' + escapeHtml(r.name) + '</td>' +
        '<td data-label="Контакт">' + escapeHtml(r.contact) + '</td>' +
        '<td data-label="Придёт"><span class="' + (r.attend === 'yes' ? 'yes' : 'no') + '">' + (r.attend === 'yes' ? 'Да' : 'Нет') + '</span></td>' +
        '<td data-label="Когда">' + fmtDate(r.created_at) + '</td>' +
        '</tr>';
    }).join('');
    tableWrap.innerHTML =
      '<table><thead><tr><th>Имя</th><th>Контакт</th><th>Придёт</th><th>Когда</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function load(){
    var key = keyInput.value.trim();
    if (!key){ setMsg('Введите admin-ключ', 'err'); return; }
    localStorage.setItem('rsvp_admin_key', key);
    loadBtn.disabled = true;
    setMsg('Загружаем…');
    fetch(API_BASE + '/api/rsvp', { headers: { 'x-admin-key': key } })
      .then(function(r){ return r.json().then(function(j){ return { status: r.status, json: j }; }); })
      .then(function(res){
        loadBtn.disabled = false;
        if (res.status === 401){ setMsg('Неверный ключ', 'err'); return; }
        if (!res.json.ok){ setMsg('Ошибка сервера', 'err'); return; }
        setMsg('Готово · ' + res.json.count + ' анкет(ы)', 'ok');
        refreshBtn.hidden = false;
        render(res.json.rsvps || []);
      })
      .catch(function(){
        loadBtn.disabled = false;
        setMsg('Не удалось связаться с сервером — проверьте интернет', 'err');
      });
  }

  loadBtn.addEventListener('click', load);
  refreshBtn.addEventListener('click', load);
  keyInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') load(); });

  if (saved) load(); // auto-load if we remember a key from before
})();
</script>
</body>
</html>
